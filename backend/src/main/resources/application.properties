spring.application.name=dataflow

# ── WebFlux ──────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL (R2DBC) ─────────────────────────────────────────────────────────────
spring.r2dbc.url=r2dbc:mysql://localhost:3306/dataflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.r2dbc.username=dataflow
spring.r2dbc.password=dataflow123
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://dataflow:dataflow123@localhost:27017/dataflow?authSource=admin

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=dataflow-backend
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# ── MinIO ─────────────────────────────────────────────────────────────────────
minio.endpoint=http://localhost:9000
minio.access-key=dataflow
minio.secret-key=dataflow123
minio.bucket.input=dataflow-input
minio.bucket.output=dataflow-output
minio.bucket.temp=dataflow-temp
minio.presign-expiry-minutes=15

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=DataFlow_JWT_Secret_Key_Must_Be_At_Least_256_Bits_Long_For_HS256
jwt.expiration-ms=86400000

# ── Spring Security ───────────────────────────────────────────────────────────
spring.security.user.name=admin

# ── Docker Compose integration ────────────────────────────────────────────────
spring.docker.compose.file=compose.yaml
spring.docker.compose.lifecycle-management=start-only

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.hades.dataflow=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
